<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>腳本生成工具</title>
    <!-- Tabler Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"
    />
    <style>
      /* ── Design tokens (CSS variables used by the component) ── */
      :root {
        --color-text-primary:     #1a1a1a;
        --color-text-secondary:   #555;
        --color-text-tertiary:    #888;
        --color-text-info:        #1a4fba;
        --color-text-success:     #085041;
        --color-text-danger:      #b91c1c;

        --color-background-primary:   #fff;
        --color-background-secondary: #f5f5f5;
        --color-background-tertiary:  #e8e8e8;
        --color-background-info:      #eef3ff;
        --color-background-success:   #e1f5ee;
        --color-background-danger:    #fef2f2;

        --color-border-primary:   #c0c0c0;
        --color-border-secondary: #d0d0d0;
        --color-border-tertiary:  #e0e0e0;
        --color-border-info:      #4f6fca;
        --color-border-danger:    #f87171;

        --border-radius-sm: 4px;
        --border-radius-md: 8px;
        --border-radius-lg: 12px;
      }

      *, *::before, *::after { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f9f9f9;
        color: var(--color-text-primary);
        display: flex;
        justify-content: center;
        padding: 2rem 1rem;
        min-height: 100vh;
      }

      #root {
        width: 100%;
        max-width: 720px;
      }

      input, select, textarea, button {
        font-family: inherit;
        font-size: 13px;
        outline: none;
      }

      input, select, textarea {
        border: 0.5px solid var(--color-border-tertiary);
        border-radius: var(--border-radius-md);
        background: var(--color-background-primary);
        color: var(--color-text-primary);
        padding: 7px 10px;
      }

      input:focus, select:focus, textarea:focus {
        border-color: var(--color-border-info);
        box-shadow: 0 0 0 3px rgba(79, 111, 202, 0.12);
      }

      button { transition: opacity 0.15s; }
      button:hover:not(:disabled) { opacity: 0.85; }

      @keyframes spin { to { transform: rotate(360deg); } }
      .ti-loader { display: inline-block; animation: spin 0.9s linear infinite; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
